<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3d0f5c"/>
      <stop offset="100%" stop-color="#1a0530"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg4)"/>
  <!-- Confetti -->
  <rect x="40" y="30" width="8" height="8" fill="#ff6b9d" opacity="0.8" transform="rotate(20,44,34)"/>
  <rect x="240" y="50" width="8" height="8" fill="#ffd700" opacity="0.8" transform="rotate(-15,244,54)"/>
  <rect x="70" y="260" width="8" height="8" fill="#00e5ff" opacity="0.8" transform="rotate(35,74,264)"/>
  <rect x="220" y="250" width="8" height="8" fill="#ff6b9d" opacity="0.8" transform="rotate(-25,224,254)"/>
  <rect x="150" y="25" width="6" height="6" fill="#b5ead7" opacity="0.8" transform="rotate(10,153,28)"/>
  <rect x="270" y="180" width="6" height="6" fill="#ffd700" opacity="0.8" transform="rotate(40,273,183)"/>
  <rect x="20" y="170" width="6" height="6" fill="#ff6b9d" opacity="0.8" transform="rotate(-10,23,173)"/>
  <!-- Cake base -->
  <rect x="75" y="195" width="150" height="50" rx="8" fill="#c77dff"/>
  <rect x="75" y="175" width="150" height="35" rx="6" fill="#e0aaff"/>
  <rect x="90" y="155" width="120" height="35" rx="6" fill="#9d4edd"/>
  <!-- Frosting drips -->
  <ellipse cx="110" cy="175" rx="10" ry="6" fill="white" opacity="0.7"/>
  <ellipse cx="150" cy="172" rx="10" ry="6" fill="white" opacity="0.7"/>
  <ellipse cx="190" cy="175" rx="10" ry="6" fill="white" opacity="0.7"/>
  <!-- Candles -->
  <rect x="115" y="130" width="10" height="28" rx="3" fill="#ff6b9d"/>
  <rect x="145" y="125" width="10" height="33" rx="3" fill="#ffd700"/>
  <rect x="175" y="130" width="10" height="28" rx="3" fill="#00e5ff"/>
  <!-- Flames -->
  <ellipse cx="120" cy="126" rx="5" ry="8" fill="#ffb703" opacity="0.9"/>
  <ellipse cx="150" cy="121" rx="5" ry="8" fill="#ffb703" opacity="0.9"/>
  <ellipse cx="180" cy="126" rx="5" ry="8" fill="#ffb703" opacity="0.9"/>
  <!-- Decorations on cake -->
  <circle cx="115" cy="210" r="6" fill="#ffd700"/>
  <circle cx="150" cy="213" r="6" fill="#ff6b9d"/>
  <circle cx="185" cy="210" r="6" fill="#00e5ff"/>
  <!-- Text -->
  <text x="150" y="270" font-family="Georgia,serif" font-size="12" fill="#e0aaff" text-anchor="middle" letter-spacing="2">HAPPY BIRTHDAY 🎂</text>
</svg>
