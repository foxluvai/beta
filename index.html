<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fox · Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(139, 92, 246, 0.4);
      --accent: #8b5cf6;
      --accent-2: #06b6d4;
      --text-primary: #f1f1f5;
      --text-muted: #6b6b80;
      --glow-avatar: 0 0 20px rgba(139, 92, 246, 0.6), 0 0 60px rgba(139, 92, 246, 0.2);
      --card-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px var(--border);
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-display);
      overflow-x: hidden;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-text {
      font-family: var(--font-mono);
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
      user-select: none;
    }

    .overlay-text::before {
      content: '> ';
      color: var(--accent);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }

    #bg-music {
      display: none;
    }

    #particles-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.1s;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent));
      background-size: 300% 300%;
      animation: border-spin 4s linear infinite;
      z-index: -1;
      opacity: 0.35;
    }

    @keyframes border-spin {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .avatar-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
    }

    /* ---- Khung viền xoay kiểu Discord ---- */
    .avatar-frame {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      z-index: 0;
      padding: 3px;
      background: conic-gradient(
        from 0deg,
        #8b5cf6,
        #06b6d4,
        #a855f7,
        #ec4899,
        #8b5cf6
      );
      animation: frame-spin 3s linear infinite;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    @keyframes frame-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .avatar-frame::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #8b5cf6,
        #06b6d4,
        #a855f7,
        #ec4899,
        #8b5cf6
      );
      filter: blur(8px);
      opacity: 0.6;
      z-index: -1;
      animation: frame-spin 3s linear infinite;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
      border: 3px solid var(--bg);
      box-shadow: var(--glow-avatar);
    }

    .avatar-wrapper::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: pulse-ring 2.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(0.92); opacity: 0.7; }
      100% { transform: scale(1.22); opacity: 0; }
    }

    .online-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      background: #22c55e;
      border-radius: 50%;
      border: 2.5px solid var(--bg);
      z-index: 3;
      box-shadow: 0 0 8px #22c55e;
    }

    .profile-name {
      font-size: clamp(1.5rem, 6vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      position: relative;
      text-align: center;
    }

    .profile-name::before,
    .profile-name::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
    }

    .profile-name::before {
      color: var(--accent);
      animation: glitch-1 3.5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    .profile-name::after {
      color: var(--accent-2);
      animation: glitch-2 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch-1 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92%           { transform: translate(-3px, -1px); opacity: 0.7; }
      94%           { transform: translate(3px, 1px); opacity: 0.6; }
      96%           { transform: translate(-2px, 0); opacity: 0; }
    }

    @keyframes glitch-2 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92%           { transform: translate(3px, 1px); opacity: 0.7; }
      94%           { transform: translate(-3px, -1px); opacity: 0.6; }
      96%           { transform: none; opacity: 0; }
    }

    .profile-tag {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-top: -0.6rem;
    }

    .bio {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      font-family: var(--font-mono);
      min-height: 1.4em;
    }

    .bio .cursor {
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink-cursor 0.75s step-end infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }

    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .badge:hover {
      transform: translateY(-2px);
    }

    .badge-verified {
      background: rgba(88, 101, 242, 0.15);
      border-color: rgba(88, 101, 242, 0.5);
      color: #818cf8;
      box-shadow: 0 0 12px rgba(88, 101, 242, 0.2);
    }
    .badge-dev {
      background: rgba(6, 182, 212, 0.12);
      border-color: rgba(6, 182, 212, 0.4);
      color: #22d3ee;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.15);
    }
    .badge-music {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.35);
      color: #4ade80;
    }
    .badge-vn {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.35);
      color: #f87171;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .qr-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .qr-frame {
      width: 130px;
      height: 130px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.35s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .qr-frame:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 40px rgba(139, 92, 246, 0.35);
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .qr-sublabel {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .socials {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.05rem;
      text-decoration: none;
      transition: color 0.25s, background 0.25s, border-color 0.25s,
                  transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s;
    }

    .social-btn:hover {
      transform: translateY(-4px) scale(1.1);
    }

    .social-btn.facebook:hover  { color: #1877f2; border-color: #1877f2; box-shadow: 0 0 18px rgba(24,119,242,0.45); background: rgba(24,119,242,0.12); }
    .social-btn.tiktok:hover    { color: #00f2ea; border-color: #00f2ea; box-shadow: 0 0 18px rgba(0,242,234,0.45); background: rgba(0,242,234,0.12); }
    .social-btn.discord:hover   { color: #5865f2; border-color: #5865f2; box-shadow: 0 0 18px rgba(88,101,242,0.45); background: rgba(88,101,242,0.12); }
    .social-btn.email:hover     { color: #ea4335; border-color: #ea4335; box-shadow: 0 0 18px rgba(234,67,53,0.45); background: rgba(88,101,242,0.12); }
    .footer-text {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
      margin-top: -0.5rem;
    }

    #music-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 100;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.95rem;
      cursor: pointer;
      display: none; 
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    #music-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(139,92,246,0.12);
    }

    #music-toggle.playing i::before {
      content: '\f028'; 
    }

    #music-toggle.playing {
      animation: spin-slow 3s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem 1.5rem;
        border-radius: 20px;
        gap: 1rem;
      }
      .avatar-wrapper { width: 88px; height: 88px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div id="overlay" role="button" aria-label="Click to enter">
    <span class="overlay-text">Thông tin của tớ ở đây nè. Bấm đi ♥ </span>
  </div>

  <audio id="bg-music" loop>
    <source src="https://github.com/foxluvai/profile/raw/refs/heads/main/Audio.mp3" type="audio/mpeg" />
  </audio>

  <button id="music-toggle" aria-label="Toggle music">
    <i class="fa-solid fa-music"></i>
  </button>

  <canvas id="particles-canvas"></canvas>

  <div class="page-wrapper">
    <article class="card" aria-label="Profile card">

      <div class="avatar-wrapper">
        <div class="avatar-frame"></div>
        <img
          class="avatar"
          src="https://raw.githubusercontent.com/foxluvai/profile/refs/heads/main/Avatar.jpg"
          alt="Avatar"
          loading="lazy"
        />
        <span class="online-dot" aria-label="Online" title="Online"></span>
      </div>

      <h1 class="profile-name" data-text="Mạnh Hưng">Mạnh Hưng</h1>
      <p class="profile-tag">@ToLaCao</p>

      <p class="bio" id="bio-text"><span class="cursor"></span></p>

      <div class="divider"></div>

      <div class="badges" role="list" aria-label="Badges">
        <span class="badge badge-verified" role="listitem">
          <i class="fa-solid fa-circle-check"></i> Verified
        </span>
        <span class="badge badge-dev" role="listitem">
          <i class="fa-solid fa-code"></i> Developer
        </span>
        <span class="badge badge-music" role="listitem">
          <i class="fa-solid fa-headphones"></i> Music
        </span>  
        <span class="badge badge-vn" role="listitem">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0;border-radius:2px;">
            <rect width="14" height="10" fill="#DA251D"/>
            <polygon points="7,1.5 7.95,4.2 10.8,4.2 8.55,5.8 9.4,8.5 7,6.8 4.6,8.5 5.45,5.8 3.2,4.2 6.05,4.2" fill="#FFFF00"/>
          </svg>
          Vietnam
        </span>
      </div>

      <div class="divider"></div>

      <div class="qr-section">
        <span class="qr-label">💸 Donate / Chuyển khoản</span>
        <div class="qr-frame" title="Quét mã QR để chuyển khoản">
          <img
            src="https://raw.githubusercontent.com/foxluvai/profile/refs/heads/main/QRCode.jpg"
            alt="QR Code chuyển khoản"
            loading="lazy"
          />
        </div>
        <span class="qr-sublabel">Quét mã QR · Mọi ngân hàng đều được</span>
      </div>

      <div class="divider"></div>

      <nav class="socials" aria-label="Mạng xã hội">
        <a href="https://www.facebook.com/march9thh" class="social-btn facebook"  target="_blank" rel="noopener" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://www.tiktok.com/@foxloveai" class="social-btn tiktok"    target="_blank" rel="noopener" aria-label="TikTok">
          <i class="fa-brands fa-tiktok"></i>
        </a>
        <a href="https://discord.com/users/692932677321621525/" class="social-btn discord"   target="_blank" rel="noopener" aria-label="Discord">
          <i class="fa-brands fa-discord"></i>
        </a>
        <a href="mailto:foxluvai93@gmail.com" class="social-btn email" target="_blank" rel="noopener" aria-label="Email">
          <i class="fa-solid fa-envelope"></i>
        </a>
      </nav>

    </article>

    <p class="footer-text" style="position:absolute; bottom:1rem;">
      made with code ♥ · foxluvai © 2026
    </p>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('particles-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, particles;

      const COUNT = 90;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = Array.from({ length: COUNT }, () => ({
          x:      Math.random() * W,
          y:      Math.random() * H,
          r:      Math.random() * 1.5 + 0.3,
          speedY: Math.random() * 0.4 + 0.1,
          speedX: (Math.random() - 0.5) * 0.15,
          alpha:  Math.random() * 0.5 + 0.1,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(139, 92, 246, ${p.alpha})`;
          ctx.fill();

          p.y += p.speedY;
          p.x += p.speedX;

          if (p.y > H + 5) { p.y = -5; p.x = Math.random() * W; }
          if (p.x < -5)    p.x = W + 5;
          if (p.x > W + 5) p.x = -5;
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createParticles(); });
      resize();
      createParticles();
      draw();
    })();

    const overlay      = document.getElementById('overlay');
    const bgMusic      = document.getElementById('bg-music');
    const musicToggle  = document.getElementById('music-toggle');
    let   musicPlaying = false;

    overlay.addEventListener('click', () => {
      overlay.classList.add('fade-out');

      bgMusic.volume = 0.35;
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicToggle.style.display = 'flex';
        musicToggle.classList.add('playing');
      }).catch(() => {
        musicToggle.style.display = 'flex';
      });

      overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
    });

    musicToggle.addEventListener('click', () => {
      if (musicPlaying) {
        bgMusic.pause();
        musicPlaying = false;
        musicToggle.classList.remove('playing');
        musicToggle.querySelector('i').className = 'fa-solid fa-volume-xmark';
      } else {
        bgMusic.play();
        musicPlaying = true;
        musicToggle.classList.add('playing');
        musicToggle.querySelector('i').className = 'fa-solid fa-music';
      }
    });

    const bioLines = [
      'Lập trình viên ban đêm 🌙',
      'Coffee → Code → Repeat ☕',
      'Đam mê công nghệ & âm nhạc 🎵',
    ];

    (function typewriter() {
      const bioEl    = document.getElementById('bio-text');
      let   lineIdx  = 0;
      let   charIdx  = 0;
      let   deleting = false;
      let   pause    = false;

      function tick() {
        const line    = bioLines[lineIdx];
        const current = line.slice(0, charIdx);

        bioEl.innerHTML = current + '<span class="cursor"></span>';

        if (!deleting) {
          if (charIdx < line.length) {
            charIdx++;
            setTimeout(tick, 55);
          } else {
            pause = true;
            setTimeout(() => { deleting = true; pause = false; tick(); }, 1800);
          }
        } else {
          if (charIdx > 0) {
            charIdx--;
            setTimeout(tick, 30);
          } else {
            deleting = false;
            lineIdx  = (lineIdx + 1) % bioLines.length;
            setTimeout(tick, 500);
          }
        }
      }

      setTimeout(tick, 900);
    })();

    const KONAMI = [38,38,40,40,37,39,37,39,66,65];
    let   konamiIdx = 0;
    document.addEventListener('keydown', e => {
      if (e.keyCode === KONAMI[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === KONAMI.length) {
          document.body.style.animation = 'rainbow-bg 2s linear infinite';
          konamiIdx = 0;
          setTimeout(() => document.body.style.animation = '', 4000);
        }
      } else { konamiIdx = 0; }
    });

    const s = document.createElement('style');
    s.textContent = `
      @keyframes rainbow-bg {
        0%   { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
    `;
    document.head.appendChild(s);
  </script>

</body>
</html>
