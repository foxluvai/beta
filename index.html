<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fox · Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(139, 92, 246, 0.4);
      --accent: #8b5cf6;
      --accent-2: #06b6d4;
      --text-primary: #f1f1f5;
      --text-muted: #6b6b80;
      --glow-avatar: 0 0 20px rgba(139, 92, 246, 0.6), 0 0 60px rgba(139, 92, 246, 0.2);
      --card-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px var(--border);
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-display);
      overflow-x: hidden;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
      transition: opacity 1s ease;
      text-align: center;
      padding: 1rem;
    }

    #overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-text {
      font-family: var(--font-mono);
      font-size: clamp(0.85rem, 3.5vw, 1.4rem);
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
      user-select: none;
      text-align: center;
      width: 100%;
      max-width: 480px;
      word-break: break-word;
      display: block;
    }

    .overlay-text .prompt-arrow {
      color: var(--accent);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }

    #bg-music {
      display: none;
    }

    #particles-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.1s;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent));
      background-size: 300% 300%;
      animation: border-spin 4s linear infinite;
      z-index: -1;
      opacity: 0.35;
    }

    @keyframes border-spin {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .avatar-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-image: url('./Avatar.jpg'); 
      background-size: cover;
      background-position: center;
      display: block;
      position: relative;
      z-index: 1;
      border: 2px solid transparent;
      box-shadow: var(--glow-avatar);
      -webkit-touch-callout: none; 
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    .avatar-decoration {
      position: absolute;
      inset: -12.5%;
      width: 125%;
      height: 125%;
      z-index: 2;
      pointer-events: none;
      object-fit: contain;
    }

    .avatar-wrapper::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: pulse-ring 2.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(0.92); opacity: 0.7; }
      100% { transform: scale(1.22); opacity: 0; }
    }

    .online-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      background: #22c55e;
      border-radius: 50%;
      border: 2.5px solid var(--bg);
      z-index: 3;
      box-shadow: 0 0 8px #22c55e;
    }

    .profile-name {
      font-size: clamp(1.5rem, 6vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      position: relative;
      text-align: center;
    }

    .profile-name::before,
    .profile-name::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
    }

    .profile-name::before {
      color: var(--accent);
      animation: glitch-1 3.5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    .profile-name::after {
      color: var(--accent-2);
      animation: glitch-2 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch-1 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92%           { transform: translate(-3px, -1px); opacity: 0.7; }
      94%           { transform: translate(3px, 1px); opacity: 0.6; }
      96%           { transform: translate(-2px, 0); opacity: 0; }
    }

    @keyframes glitch-2 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92%           { transform: translate(3px, 1px); opacity: 0.7; }
      94%           { transform: translate(-3px, -1px); opacity: 0.6; }
      96%           { transform: none; opacity: 0; }
    }

    .profile-tag {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-top: -0.6rem;
    }

    .bio {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      font-family: var(--font-mono);
      min-height: 1.4em;
    }

    .bio .cursor {
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink-cursor 0.75s step-end infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }

    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .badge:hover {
      transform: translateY(-2px);
    }

    .badge-verified {
      background: rgba(88, 101, 242, 0.15);
      border-color: rgba(88, 101, 242, 0.5);
      color: #818cf8;
      box-shadow: 0 0 12px rgba(88, 101, 242, 0.2);
    }
    .badge-dev {
      background: rgba(6, 182, 212, 0.12);
      border-color: rgba(6, 182, 212, 0.4);
      color: #22d3ee;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.15);
    }
    .badge-music {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.35);
      color: #4ade80;
    }
    .badge-vn {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.35);
      color: #f87171;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .qr-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .qr-frame {
      width: 130px;
      height: 130px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.35s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .qr-frame:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 40px rgba(139, 92, 246, 0.35);
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .qr-sublabel {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .socials {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.05rem;
      text-decoration: none;
      transition: color 0.25s, background 0.25s, border-color 0.25s,
                  transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s;
    }

    .social-btn:hover {
      transform: translateY(-4px) scale(1.1);
    }

    .social-btn.facebook:hover  { color: #1877f2; border-color: #1877f2; box-shadow: 0 0 18px rgba(24,119,242,0.45); background: rgba(24,119,242,0.12); }
    .social-btn.tiktok:hover    { color: #00f2ea; border-color: #00f2ea; box-shadow: 0 0 18px rgba(0,242,234,0.45); background: rgba(0,242,234,0.12); }
    .social-btn.discord:hover   { color: #5865f2; border-color: #5865f2; box-shadow: 0 0 18px rgba(88,101,242,0.45); background: rgba(88,101,242,0.12); }
    .social-btn.email:hover     { color: #ea4335; border-color: #ea4335; box-shadow: 0 0 18px rgba(234,67,53,0.45); background: rgba(88,101,242,0.12); }
    
    .music-player {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.75rem 1rem;
      transition: background 0.3s;
    }

    .music-player:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .player-cover {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      animation: spin-slow 8s linear infinite;
      animation-play-state: paused;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .player-cover.playing {
      animation-play-state: running;
    }

    .player-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      overflow: hidden;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-primary);
    }
    
    .player-title {
      font-weight: 700;
      color: var(--accent-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .player-time {
      color: var(--text-muted);
      font-size: 0.65rem;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 3px;
      transition: width 0.1s linear;
      position: relative;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 0;
      transform: translate(50%, -50%);
      width: 10px;
      height: 10px;
      background: var(--text-primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-2);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    .progress-container:hover .progress-bar::after {
      opacity: 1;
      transform: translate(50%, -50%) scale(1.2);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .btn-play-pause {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn-play-pause:hover {
      color: var(--accent);
      transform: scale(1.2);
    }

    .volume-container {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.15rem;
    }
    
    .volume-container i {
      font-size: 0.65rem;
      color: var(--text-muted);
      width: 12px;
      text-align: center;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      /* Vùng input cao hơn để dễ chạm/kéo trên di động, track hiển thị vẫn mảnh
         nhờ ::-webkit-slider-runnable-track / ::-moz-range-track ở dưới. */
      height: 22px;
      background: transparent;
      outline: none;
      cursor: pointer;
      touch-action: none;
    }

    .volume-slider::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    .volume-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      /* Track cao 3px nhưng thumb cao 14px, nên cần kéo thumb lên để tâm
         của nó trùng với tâm track (Safari/iOS không tự căn giữa thumb). */
      margin-top: -5.5px;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      background: var(--accent-2);
    }
    
    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    
    .volume-slider::-moz-range-thumb:hover {
      transform: scale(1.3);
      background: var(--accent-2);
    }

    .footer-text {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
      margin-top: -0.5rem;
    }

    #music-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 100;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.95rem;
      cursor: pointer;
      display: none; 
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    #music-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(139,92,246,0.12);
    }

    #music-toggle.playing i::before {
      content: '\f028'; 
    }

    #music-toggle.playing {
      animation: spin-slow 3s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem 1.5rem;
        border-radius: 20px;
        gap: 1rem;
      }
      .avatar-wrapper { width: 88px; height: 88px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div id="overlay" role="button" aria-label="Click to enter">
    <span class="overlay-text"><span class="prompt-arrow">&gt; </span>Thông tin của tớ ở đây nè ♥ </span>
  </div>

  <audio id="bg-music">
  </audio>

  <button id="music-toggle" aria-label="Toggle music">
    <i class="fa-solid fa-music"></i>
  </button>

  <canvas id="particles-canvas"></canvas>

  <div class="page-wrapper">
    <article class="card" aria-label="Profile card">

      <div class="avatar-wrapper">
        <div
          class="avatar"
          role="img"
          aria-label="Avatar"
          oncontextmenu="return false;"
          ondragstart="return false;"
        ></div>
        <img id="avatar-deco" class="avatar-decoration" src="" alt="" />
        <span class="online-dot" aria-label="Online" title="Online"></span>
      </div>

      <h1 class="profile-name" data-text="Mạnh Hưng">Mạnh Hưng</h1>
      <p class="profile-tag">@ToLaCao</p>

      <p class="bio" id="bio-text"><span class="cursor"></span></p>

      <div class="divider"></div>

      <div class="badges" role="list" aria-label="Badges">
        <span class="badge badge-verified" role="listitem">
          <i class="fa-solid fa-circle-check"></i> Verified
        </span>
        <span class="badge badge-dev" role="listitem">
          <i class="fa-solid fa-code"></i> Developer
        </span>
        <span class="badge badge-music" role="listitem">
          <i class="fa-solid fa-headphones"></i> Music
        </span>  
        <span class="badge badge-vn" role="listitem">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0;border-radius:2px;">
            <rect width="14" height="10" fill="#DA251D"/>
            <polygon points="7,1.5 7.95,4.2 10.8,4.2 8.55,5.8 9.4,8.5 7,6.8 4.6,8.5 5.45,5.8 3.2,4.2 6.05,4.2" fill="#FFFF00"/>
          </svg>
          Vietnam
        </span>
      </div>

      <div class="divider"></div>

      <div class="qr-section">
        <span class="qr-label">💸 Donate / Chuyển khoản</span>
        <div class="qr-frame" title="Quét mã QR để chuyển khoản">
          <img
            src="./QRCode.jpg"
            alt="QR Code chuyển khoản"
            loading="lazy"
          />
        </div>
        <span class="qr-sublabel">Quét mã QR · Mọi ngân hàng đều được</span>
      </div>

      <div class="divider"></div>

      <nav class="socials" aria-label="Mạng xã hội">
        <a href="https://www.facebook.com/march9thh" class="social-btn facebook"  target="_blank" rel="noopener" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://www.tiktok.com/@foxloveai" class="social-btn tiktok"    target="_blank" rel="noopener" aria-label="TikTok">
          <i class="fa-brands fa-tiktok"></i>
        </a>
        <a href="https://discord.gg/UqKa6npGhZ" class="social-btn discord"   target="_blank" rel="noopener" aria-label="Discord">
          <i class="fa-brands fa-discord"></i>
        </a>
        <a href="mailto:foxluvai93@gmail.com" class="social-btn email" target="_blank" rel="noopener" aria-label="Email">
          <i class="fa-solid fa-envelope"></i>
        </a>
      </nav>

      <div class="divider"></div>
      
      <div class="music-player">
        <img id="player-cover" src="" alt="Music Cover" class="player-cover" />
        <div class="player-info">
          <div class="player-header">
            <span id="player-title" class="player-title">Loading...</span>
            <span id="player-time" class="player-time">0:00 / 0:00</span>
          </div>
          <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="volume-container">
            <i class="fa-solid fa-volume-low" id="volume-icon"></i>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.35" aria-label="Volume" />
          </div>
        </div>
        <div class="player-controls">
          <button id="btn-play-pause" class="btn-play-pause">
            <i class="fa-solid fa-play"></i>
          </button>
        </div>
      </div>

    </article>

    
    <p class="footer-text" style="position:absolute; bottom:1rem;">
      made by fox ♥ · foxluvai © 2026
    </p>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('particles-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, particles;

      const COUNT = 150;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = Array.from({ length: COUNT }, () => ({
          x:      Math.random() * W,
          y:      Math.random() * H,
          r:      Math.random() * 1.5 + 0.3,
          speedY: Math.random() * 0.4 + 0.1,
          speedX: (Math.random() - 0.5) * 0.15,
          alpha:  Math.random() * 0.5 + 0.1,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(139, 92, 246, ${p.alpha})`;
          ctx.fill();

          p.y += p.speedY;
          p.x += p.speedX;

          if (p.y > H + 5) { p.y = -5; p.x = Math.random() * W; }
          if (p.x < -5)    p.x = W + 5;
          if (p.x > W + 5) p.x = -5;
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createParticles(); });
      resize();
      createParticles();
      draw();
    })();

    const playlist = [
      { 
        title: "Biển, Đảo Và Em (海屿你)", 
        src: "./audio/Audio1.mp3", 
        cover: "./anhaudio/1.jpg" 
      },
      { 
        title: "Có thể hay không (可不可以)", 
        src: "./audio/Audio2.mp3", 
        cover: "./anhaudio/2.jpg" 
      },
      { 
        title: "Thiếu niên (少年)",
        src: "./audio/Audio3.mp3", 
        cover: "./anhaudio/3.jpg" 
      }
    ];

    const randomTrack = playlist[Math.floor(Math.random() * playlist.length)];

    const overlay      = document.getElementById('overlay');
    const bgMusic      = document.getElementById('bg-music');
    const musicToggle  = document.getElementById('music-toggle');
    const musicToggleIcon = musicToggle.querySelector('i');
    
    const playerCover = document.getElementById('player-cover');
    const playerTitle = document.getElementById('player-title');
    const playerTime = document.getElementById('player-time');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const btnPlayPause = document.getElementById('btn-play-pause');
    const playPauseIcon = btnPlayPause.querySelector('i');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeIcon = document.getElementById('volume-icon');

    let musicPlaying = false;

    // --- Volume fix (iOS Safari ignores HTMLMediaElement.volume) ---
    // Trên iOS, audio.volume bị khoá cứng theo nút âm lượng vật lý, gán giá trị
    // qua JS không có tác dụng. Dùng Web Audio API (GainNode) để chỉnh âm lượng
    // thực tế bằng cách khuếch đại/giảm tín hiệu, hoạt động trên mọi thiết bị.
    let audioCtx = null;
    let gainNode = null;
    let audioGraphReady = false;

    function setupAudioGraph() {
      if (audioGraphReady) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return; // browser quá cũ, sẽ dùng fallback bgMusic.volume
        audioCtx = new AudioContextClass();
        const sourceNode = audioCtx.createMediaElementSource(bgMusic);
        gainNode = audioCtx.createGain();
        sourceNode.connect(gainNode).connect(audioCtx.destination);
        // Khi đã nối qua Web Audio, để bgMusic.volume cố định ở mức tối đa và
        // điều khiển âm lượng thật hoàn toàn qua gainNode để tránh xung đột.
        bgMusic.volume = 1;
        gainNode.gain.value = volumeSlider ? parseFloat(volumeSlider.value) : 0.35;
        audioGraphReady = true;
      } catch (err) {
        console.warn('Không thể khởi tạo Web Audio graph, dùng fallback volume:', err);
      }
    }

    function resumeAudioGraph() {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
    }

    function applyVolume(volume) {
      if (gainNode) {
        gainNode.gain.value = volume;
      } else {
        bgMusic.volume = volume;
      }
    }

    bgMusic.src = randomTrack.src;
    bgMusic.loop = true; // Lặp bài hát
    playerCover.src = randomTrack.cover;
    playerTitle.textContent = randomTrack.title;
    
    bgMusic.addEventListener('error', () => {
      console.warn("Could not load audio. Hãy đảm bảo các file mp3 đã được tải lên.");
      playerTitle.textContent = "Không tìm thấy file nhạc";
      playerTime.textContent = "--:-- / --:--";
    });


    function updatePlayState(isPlaying) {
      musicPlaying = isPlaying;
      if (isPlaying) {
        musicToggle.classList.add('playing');
        musicToggleIcon.className = 'fa-solid fa-music';
        playPauseIcon.className = 'fa-solid fa-pause';
        playerCover.classList.add('playing');
      } else {
        musicToggle.classList.remove('playing');
        musicToggleIcon.className = 'fa-solid fa-volume-xmark';
        playPauseIcon.className = 'fa-solid fa-play';
        playerCover.classList.remove('playing');
      }
    }

    overlay.addEventListener('click', () => {
      overlay.classList.add('fade-out');

      // setupAudioGraph() phải được gọi trong cùng một user-gesture (click) này
      // để iOS Safari cho phép tạo/resume AudioContext.
      setupAudioGraph();
      resumeAudioGraph();
      applyVolume(volumeSlider ? parseFloat(volumeSlider.value) : 0.35);

      bgMusic.play().then(() => {
        musicToggle.style.display = 'flex';
        updatePlayState(true);
      }).catch(() => {
        musicToggle.style.display = 'flex';
        updatePlayState(false);
      });

      overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
    });

    musicToggle.addEventListener('click', () => {
      resumeAudioGraph();
      if (musicPlaying) {
        bgMusic.pause();
        updatePlayState(false);
      } else {
        bgMusic.play();
        updatePlayState(true);
      }
    });

    btnPlayPause.addEventListener('click', () => {
      resumeAudioGraph();
      if (musicPlaying) {
        bgMusic.pause();
        updatePlayState(false);
      } else {
        bgMusic.play();
        updatePlayState(true);
      }
    });

    if (volumeSlider) {
      volumeSlider.addEventListener('input', (e) => {
        const volume = parseFloat(e.target.value);
        applyVolume(volume);

        if (volume === 0) {
          volumeIcon.className = 'fa-solid fa-volume-xmark';
        } else if (volume < 0.5) {
          volumeIcon.className = 'fa-solid fa-volume-low';
        } else {
          volumeIcon.className = 'fa-solid fa-volume-high';
        }
      });
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    bgMusic.addEventListener('timeupdate', () => {
      const currentTime = bgMusic.currentTime;
      const duration = bgMusic.duration;
      if (duration) {
        const percent = (currentTime / duration) * 100;
        progressBar.style.width = `${percent}%`;
        playerTime.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
      }
    });

    bgMusic.addEventListener('loadedmetadata', () => {
      playerTime.textContent = `0:00 / ${formatTime(bgMusic.duration)}`;
    });

    progressContainer.addEventListener('click', (e) => {
      const rect = progressContainer.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const percent = clickX / rect.width;
      bgMusic.currentTime = percent * bgMusic.duration;
    });


    const bioLines = [
      'Lập trình viên ban đêm 🌙',
      'Coffee → Code → Repeat ☕',
      'Đam mê công nghệ & âm nhạc 🎵',
      'Owner server Thời gian dừng lại ⏳',
    ];

    (function typewriter() {
      const bioEl    = document.getElementById('bio-text');
      let   lineIdx  = 0;
      let   charIdx  = 0;
      let   deleting = false;
      let   pause    = false;

      function tick() {
        const line    = bioLines[lineIdx];
        const current = line.slice(0, charIdx);

        bioEl.innerHTML = current + '<span class="cursor"></span>';

        if (!deleting) {
          if (charIdx < line.length) {
            charIdx++;
            setTimeout(tick, 55);
          } else {
            pause = true;
            setTimeout(() => { deleting = true; pause = false; tick(); }, 1800);
          }
        } else {
          if (charIdx > 0) {
            charIdx--;
            setTimeout(tick, 30);
          } else {
            deleting = false;
            lineIdx  = (lineIdx + 1) % bioLines.length;
            setTimeout(tick, 500);
          }
        }
      }

      setTimeout(tick, 900);
    })();

    const KONAMI = [38,38,40,40,37,39,37,39,66,65];
    let   konamiIdx = 0;
    document.addEventListener('keydown', e => {
      if (e.keyCode === KONAMI[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === KONAMI.length) {
          document.body.style.animation = 'rainbow-bg 2s linear infinite';
          konamiIdx = 0;
          setTimeout(() => document.body.style.animation = '', 4000);
        }
      } else {
        // Gõ sai: nếu phím vừa bấm trùng với bước đầu tiên của dãy,
        // coi như bắt đầu lại từ bước 1 thay vì reset cứng về 0.
        konamiIdx = (e.keyCode === KONAMI[0]) ? 1 : 0;
      }
    });

    const s = document.createElement('style');
    s.textContent = `
      @keyframes rainbow-bg {
        0%   { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
    `;
    document.head.appendChild(s);

  </script>

  <script src="borders-loader.js"></script>

</body>
